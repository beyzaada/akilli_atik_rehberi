<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akıllı Atık Rehberi</title>
    <meta
      name="description"
      content="Atığını yaz, doğru kutuyu öğren. Akıllı Atık Rehberi ile biyoplastik ve ambalaj atıklarını doğru şekilde yönlendir."
    />
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styles -->
    <link rel="stylesheet" href="../src/style.css" />
  </head>
  <body class="min-h-screen bg-emerald-50 text-slate-900 flex items-center justify-center">
    <div class="w-full max-w-xl px-4 py-10">
      <header class="text-center mb-8">
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-emerald-900">
          Akıllı Atık Rehberi
        </h1>
        <p class="mt-2 text-sm sm:text-base text-emerald-800">
          Atığını yaz. Doğru kutuyu öğren.
        </p>
      </header>

      <main class="bg-white/80 backdrop-blur rounded-2xl shadow-lg p-5 sm:p-6 border border-emerald-100">
        <form id="query-form" class="space-y-4">
          <label for="query" class="block text-sm font-medium text-slate-700">
            Elindeki ambalajı veya atığı kısaca tanımla
          </label>
          <div class="flex flex-col sm:flex-row gap-3">
            <input
              id="query"
              name="query"
              type="text"
              maxlength="200"
              placeholder="Örn: Biyobozunur PLA çatal"
              class="flex-1 rounded-xl border border-emerald-200 bg-emerald-50/60 px-3.5 py-2.5 text-sm sm:text-base shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-300 outline-none transition"
            />
            <button
              id="analyze-button"
              type="submit"
              class="inline-flex items-center justify-center rounded-xl bg-emerald-600 px-5 py-2.5 text-sm sm:text-base font-semibold text-white shadow-sm hover:bg-emerald-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 focus-visible:ring-offset-2 transition disabled:opacity-60 disabled:cursor-not-allowed"
            >
              Analiz Et
            </button>
          </div>
          <p id="helper-text" class="text-xs text-slate-500">
            Maksimum 200 karakter. Örn: "PLA logolu kahve kapağı", "deniz yosunundan yapılmış bardak".
          </p>
        </form>

        <div id="loading-state" class="mt-4 hidden">
          <div class="flex items-center gap-2 text-sm text-slate-600">
            <span class="loader-circle"></span>
            <span>Analiz ediliyor, lütfen bekleyin…</span>
          </div>
        </div>

        <div id="message-area" class="mt-4 text-sm"></div>

        <section id="result-container" class="mt-6"></section>
      </main>

      <footer class="mt-6 text-center text-xs text-slate-500">
        Bu bir prototiptir. Sonuçlar yalnızca bilgilendirme amaçlıdır.
      </footer>
    </div>

    <script src="../src/main.js"></script>
  </body>
</html>
